<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tanahin</title>
</head>
<body>
  <h1>Ukur Tanah AI</h1>

  <p>Foto 1 - wajib ada A4:</p>
  <input type="file" id="foto1" accept="image/*"><br><br>

  <p>Foto 2:</p>
  <input type="file" id="foto2" accept="image/*"><br><br>

  <p>Foto 3:</p>
  <input type="file" id="foto3" accept="image/*"><br><br>

  <p>Foto 4:</p>
  <input type="file" id="foto4" accept="image/*"><br><br>

  <button id="analisisBtn">Analisis & Ukur Tanah</button>

  <h3>Hasil:</h3>
  <p>Ukuran: <span id="ukuranTanah">-</span></p>
  <p>Luas: <span id="luasTanah">-</span> m²</p>

<script>
async function kirimKeGemini() {
  const btn = document.getElementById('analisisBtn');
  btn.innerText = '⏳ AI lagi ngukur...';
  btn.disabled = true;

  try {
    const foto1 = await toBase64(document.getElementById('foto1').files[0]);
    const foto2 = await toBase64(document.getElementById('foto2').files[0]);
    const foto3 = await toBase64(document.getElementById('foto3').files[0]);
    const foto4 = await toBase64(document.getElementById('foto4').files[0]);

    if (!foto1 ||!foto2 ||!foto3 ||!foto4) {
      alert('Upload 4 foto dulu bro');
      return;
    }

    const res = await fetch('/.netlify/functions/ukur', {
      method: 'POST',
      body: JSON.stringify({ foto1, foto2, foto3, foto4 })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('ukuranTanah').innerText = data.panjang + 'm x ' + data.lebar + 'm';
    document.getElementById('luasTanah').innerText = data.luas;

  } catch (err) {
    alert('Gagal: ' + err.message);
  } finally {
    btn.innerText = 'Analisis & Ukur Tanah';
    btn.disabled = false;
  }
}

function toBase64(file) {
  return new Promise((resolve) => {
    if (!file) return resolve(null);
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => resolve(null);
  });
}

document.getElementById('analisisBtn').onclick = kirimKeGemini;
</script>
</body>
</html>
