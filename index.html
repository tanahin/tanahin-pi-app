<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanahin</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>Pi.init({ version: "2.0", sandbox: false });</script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #fff; }
        h1 { margin-bottom: 8px; }
        p { color: #666; margin-top: 0; }
        .result-box { background: #f8f9fa; border-radius: 12px; padding: 20px; margin: 20px 0; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .result-item:last-child { margin-bottom: 0; padding-top: 12px; border-top: 2px solid #ddd; font-weight: bold; font-size: 18px; color: #764ba2; }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>🏡 Tanahin</h1>
    <p>Hasil Pengukuran Tanah + RAB Otomatis</p>
    <div class="result-box">
        <div class="result-item">
            <span>Luas Tanah:</span>
            <span><b>194.56 m²</b></span>
        </div>
        <div class="result-item">
            <span>Ukuran:</span>
            <span>15.2m x 12.8m</span>
        </div>
        <div class="result-item">
            <span>Akurasi:</span>
            <span>+/- 5%</span>
        </div>
        <div class="result-item">
            <span>Estimasi RAB Rumah:</span>
            <span>Rp 2.200.000.000</span>
        </div>
    </div>
    <button class="btn" onclick="bayarPi()" id="btnBayar">Download PDF + Excel (1 Pi)</button>
    <script>
        async function bayarPi() {
            const btn = document.getElementById('btnBayar');
            btn.disabled = true;
            btn.innerText = 'Memproses...';
            
            try {
                const scopes = ['payments'];
                
                // INI KUNCINYA: BERESIN DULU PAYMENT YANG NYANGKUT
                await Pi.authenticate(scopes, async (incompletePayment) => {
                    if (incompletePayment) {
                        console.log('Menyelesaikan payment yang pending:', incompletePayment.identifier);
                        await fetch('/.netlify/functions/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                paymentId: incompletePayment.identifier, 
                                txid: incompletePayment.transaction.txid 
                            })
                        });
                    }
                });

                // KALO UDAH BERSIH, BARU BIKIN PAYMENT BARU
                await Pi.createPayment({
                    amount: 0.001,
                    memo: "Pembelian Laporan Tanahin",
                    metadata: { orderId: Date.now() },
                }, {
                    onReadyForServerApproval: async (paymentId) => {
                        await fetch('/.netlify/functions/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: paymentId })
                        });
                    },
                    onReadyForServerCompletion: async (paymentId, txid) => {
                        await fetch('/.netlify/functions/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: paymentId, txid: txid })
                        });
                        alert("Pembayaran berhasil! No 10 di Pi Developer Portal udah ijo.");
                    },
                    onCancel: (paymentId) => { alert("Pembayaran dibatalkan"); },
                    onError: (error, payment) => { alert("Error: " + error); }
                });

            } catch (err) {
                alert("Gagal: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Download PDF + Excel (1 Pi)';
            }
        }
    </script>
</body>
</html>
