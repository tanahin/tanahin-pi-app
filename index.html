<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tanahin</title>
</head>
<body>
  <h1>Ukur Tanah AI</h1>
  <p>Foto 1 - wajib ada A4:</p>
  <input type="file" id="foto1" accept="image/*"><br><br>
  <p>Foto 2:</p>
  <input type="file" id="foto2" accept="image/*"><br><br>
  <p>Foto 3:</p>
  <input type="file" id="foto3" accept="image/*"><br><br>
  <p>Foto 4:</p>
  <input type="file" id="foto4" accept="image/*"><br><br>
  <button type="button" id="analisisBtn">Analisis & Ukur Tanah</button>
  <h3>Hasil:</h3>
  <p>Ukuran: <span id="ukuranTanah">-</span></p>
  <p>Luas: <span id="luasTanah">-</span> m²</p>

<script>
document.getElementById('analisisBtn').addEventListener('click', async function() {
  const btn = this;
  btn.innerText = '⏳ AI lagi ngukur...';
  btn.disabled = true;

  try {
    const f1 = document.getElementById('foto1').files[0];
    const f2 = document.getElementById('foto2').files[0];
    const f3 = document.getElementById('foto3').files[0];
    const f4 = document.getElementById('foto4').files[0];

    if (!f1 ||!f2 ||!f3 ||!f4) {
      alert('Upload 4 foto dulu bro');
      return;
    }

    const foto1 = await fileToBase64(f1);
    const foto2 = await fileToBase64(f2);
    const foto3 = await fileToBase64(f3);
    const foto4 = await fileToBase64(f4);

    const res = await fetch('/.netlify/functions/ukur', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ foto1, foto2, foto3, foto4 })
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('ukuranTanah').innerText = data.panjang + 'm x ' + data.lebar + 'm';
    document.getElementById('luasTanah').innerText = data.luas;

  } catch (err) {
    alert('Gagal: ' + err.message);
    console.error(err);
  } finally {
    btn.innerText = 'Analisis & Ukur Tanah';
    btn.disabled = false;
  }
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
</script>
</body>
</html>
